# Base application configuration
# Environment-specific overrides in application-{env}.yaml

app:
  name: "ai-genai-llm-guardrails"
  version: "1.0.0"
  description: "LLM Guardrails Framework"
  debug: false

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

logging:
  level: "INFO"
  format: "json"
  include_timestamp: true

llm:
  provider: "mock"
  timeout_seconds: 30
  max_retries: 3
  temperature: 0.7
  max_tokens: 4096
